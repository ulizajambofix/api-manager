version: '3.9'
services:
  app:
    build: .
    volumes: [".:/var/www/html"]
    depends_on: [postgres, redis]
  nginx:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [app]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: api_manager
      POSTGRES_USER: api_manager
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
